<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flower Bokeh Garden</title>
    <style>
        :root {
            color-scheme: dark;
            --page-bg: #121c32;
            --soft-white: #f8f5f2;
            --text: #f3eff0;
            --glass: rgba(255,255,255,0.18);
            --glass-strong: rgba(255,255,255,0.24);
            --shadow: rgba(0,0,0,0.25);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at 15% 20%, rgba(236, 173, 175, 0.16), transparent 22%),
                        radial-gradient(circle at 85% 10%, rgba(111, 190, 255, 0.18), transparent 20%),
                        radial-gradient(circle at 80% 70%, rgba(225, 170, 246, 0.16), transparent 24%),
                        linear-gradient(160deg, #14203f 0%, #1f3362 35%, #11203a 100%);
            color: var(--text);
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 20%, rgba(255,255,255,0.06), transparent 14%),
                        radial-gradient(circle at 20% 70%, rgba(255,236,196,0.08), transparent 16%),
                        radial-gradient(circle at 85% 55%, rgba(255,173,196,0.08), transparent 18%);
            pointer-events: none;
        }

        main {
            position: relative;
            min-height: 100vh;
            padding: 42px 24px 64px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .bokeh {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bokeh span {
            position: absolute;
            border-radius: 50%;
            filter: blur(18px);
            opacity: 0.28;
        }

        .bokeh span:nth-child(1) { width: 260px; height: 260px; background: rgba(255, 217, 211, 0.24); top: 8%; left: 10%; }
        .bokeh span:nth-child(2) { width: 340px; height: 340px; background: rgba(117, 183, 255, 0.18); top: 18%; right: 12%; }
        .bokeh span:nth-child(3) { width: 200px; height: 200px; background: rgba(221, 170, 237, 0.18); bottom: 12%; left: 15%; }
        .bokeh span:nth-child(4) { width: 280px; height: 280px; background: rgba(255, 245, 173, 0.18); bottom: 20%; right: 18%; }
        .bokeh span:nth-child(5) { width: 140px; height: 140px; background: rgba(255, 138, 172, 0.18); top: 42%; left: 55%; }
        .bokeh span:nth-child(6) { width: 180px; height: 180px; background: rgba(128, 214, 184, 0.16); top: 62%; right: 28%; }

        .panel {
            position: relative;
            z-index: 1;
            width: min(1180px, calc(100% - 36px));
            padding: 28px;
            border-radius: 36px;
            background: rgba(11, 24, 50, 0.78);
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 28px 80px rgba(0,0,0,0.35);
            backdrop-filter: blur(16px);
            display: grid;
            gap: 22px;
        }

        .hero {
            display: grid;
            gap: 12px;
            text-align: center;
        }

        .hero h1 {
            margin: 0;
            font-size: clamp(2.6rem, 5vw, 4.1rem);
            line-height: 1.03;
            letter-spacing: -0.04em;
        }

        .hero p {
            margin: 0 auto;
            max-width: 760px;
            color: #e8e4e0;
            font-size: 1.05rem;
            opacity: 0.92;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px;
        }

        .control-group {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 999px;
            padding: 16px 18px;
            box-shadow: 0 18px 36px rgba(0,0,0,0.16);
        }

        .control-group label {
            font-size: 0.97rem;
            font-weight: 600;
        }

        .control-group input {
            width: 80px;
            border: none;
            background: transparent;
            color: var(--text);
            font-size: 1.1rem;
            font-weight: 700;
            text-align: center;
            outline: none;
        }

        .control-group input::-webkit-outer-spin-button,
        .control-group input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .button {
            border: none;
            border-radius: 999px;
            padding: 16px 28px;
            font-size: 1rem;
            font-weight: 700;
            color: #102241;
            cursor: pointer;
            background: linear-gradient(135deg, #ffd1ff 0%, #9be8ff 100%);
            box-shadow: 0 18px 36px rgba(0,0,0,0.18);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 22px 42px rgba(0,0,0,0.22);
        }

        .flower-field {
            position: relative;
            min-height: 660px;
            border-radius: 32px;
            overflow: hidden;
            background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: inset 0 0 140px rgba(255,255,255,0.05);
            display: grid;
            place-items: center;
        }

        .flower-field::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 18%, rgba(255,255,255,0.08), transparent 18%),
                        radial-gradient(circle at 15% 70%, rgba(255,221,215,0.08), transparent 16%),
                        radial-gradient(circle at 82% 50%, rgba(193,240,255,0.08), transparent 18%);
            pointer-events: none;
        }

        .flower-field::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.28), transparent 27%),
                              radial-gradient(circle at 85% 25%, rgba(255,255,255,0.18), transparent 18%),
                              radial-gradient(circle at 35% 75%, rgba(255,255,255,0.14), transparent 15%),
                              linear-gradient(180deg, transparent 10%, rgba(18, 32, 60, 0.12) 100%);
            opacity: 0.9;
            pointer-events: none;
        }

        .flower-image {
            position: relative;
            width: 100%;
            height: 100%;
            min-height: 520px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            z-index: 1;
        }

        .flower-image img {
            width: 100%;
            height: auto;
            max-width: 1000px;
            max-height: 640px;
            border-radius: 24px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.3);
            object-fit: contain;
            background: rgba(255,255,255,0.02);
        }

        .status-message {
            position: absolute;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 36px);
            text-align: center;
            font-size: 0.98rem;
            color: rgba(255,255,255,0.82);
            text-shadow: 0 1px 8px rgba(0,0,0,0.35);
            z-index: 2;
        }

        .note {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.75);
            text-align: center;
            margin-top: 4px;
        }

        @media (max-width: 760px) {
            .panel { padding: 22px; }
            .hero h1 { font-size: 2.6rem; }
            .flower-field { min-height: 520px; }
        }
    </style>
</head>
<body>
    <main>
        <div class="bokeh">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>

        <section class="panel">
            <div class="hero">
                <h1>Dreamy Exotic Flower Bokeh</h1>
                <p>Choose how many flowers you’d like and let the garden bloom in a soft, luminous environment.</p>
            </div>

            <div class="controls">
                <div class="control-group">
                    <label for="flowerCount">Flowers</label>
                    <input id="flowerCount" type="number" min="1" max="24" value="12" aria-label="Number of flowers">
                </div>
                <button class="button" id="generateBtn">Grow Garden</button>
            </div>

            <div class="note" id="noteText">Requesting 12 realistic exotic flowers from the API.</div>

            <div class="flower-field">
                <div class="flower-image" id="flowerImage"></div>
                <div class="status-message" id="statusMessage">Your generated floral scene appears here.</div>
            </div>
        </section>
    </main>

    <script>
        const flowerCount = document.getElementById('flowerCount');
        const noteText = document.getElementById('noteText');
        const generateBtn = document.getElementById('generateBtn');
        const flowerImage = document.getElementById('flowerImage');
        const statusMessage = document.getElementById('statusMessage');

        async function fetchFlowerImage() {
            const count = Math.min(Math.max(parseInt(flowerCount.value, 10) || 1, 1), 24);
            flowerCount.value = count;
            noteText.textContent = `Generating ${count} realistic exotic flowers via API...`;
            statusMessage.textContent = 'Generating image, please wait...';
            flowerImage.innerHTML = '';

            try {
                const response = await fetch(`/api/generate?count=${count}`);
                const data = await response.json();

                if (!response.ok || data.error) {
                    throw new Error(data.error || 'Image generation failed.');
                }

                const img = document.createElement('img');
                img.src = data.image_url;
                img.alt = `Realistic exotic flower photograph with ${count} blooms.`;
                img.loading = 'lazy';
                flowerImage.appendChild(img);
                statusMessage.textContent = `Realistic flower image generated successfully.`;
            } catch (error) {
                flowerImage.innerHTML = '';
                statusMessage.textContent = error.message || 'Unable to generate the flower image.';
                statusMessage.style.color = '#ffcccb';
            }
        }

        generateBtn.addEventListener('click', fetchFlowerImage);
        flowerCount.addEventListener('change', () => {
            const value = parseInt(flowerCount.value, 10);
            if (Number.isNaN(value) || value < 1) {
                flowerCount.value = 1;
            } else if (value > 24) {
                flowerCount.value = 24;
            }
        });

        window.addEventListener('load', fetchFlowerImage);
    </script>
</body>
</html>
